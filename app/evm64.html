<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EVM64 Web</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1a1a2e; color: #eee; }
        h1 { color: #00d9ff; }
        h2 { color: #ffd700; margin-top: 30px; }
        .input-group { margin: 20px 0; }
        label { display: block; margin-bottom: 5px; }
        textarea { width: 400px; height: 120px; padding: 8px; font-family: monospace; background: #16213e; border: 1px solid #0f3460; color: #eee; }
        input[type="text"] { width: 400px; padding: 8px; font-family: monospace; background: #16213e; border: 1px solid #0f3460; color: #eee; }
        button { padding: 8px 20px; background: #0f3460; color: #fff; border: none; cursor: pointer; font-family: monospace; margin-right: 10px; }
        button:hover { background: #00d9ff; color: #000; }
        table { border-collapse: collapse; width: 100%; margin-top: 20px; font-size: 12px; }
        th, td { border: 1px solid #0f3460; padding: 6px 8px; text-align: left; }
        th { background: #16213e; color: #00d9ff; }
        tr:nth-child(even) { background: #16213e; }
        .stack-val { color: #ffd700; }
        .result { margin-top: 20px; padding: 10px; background: #16213e; border: 1px solid #0f3460; }
        .output-box { margin-top: 10px; padding: 10px; background: #16213e; border: 1px solid #0f3460; font-family: monospace; white-space: pre-wrap; }
        .bytecode-display { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 10px; }
        .byte-box { 
            width: 28px; height: 28px; 
            display: flex; align-items: center; justify-content: center;
            background: #16213e; border: 1px solid #0f3460;
            font-family: monospace; font-size: 12px; color: #eee;
            cursor: default; position: relative;
        }
        .byte-box:hover { background: #0f3460; border-color: #00d9ff; }
        .byte-box.highlight { background: #00d9ff; color: #000; border-color: #00d9ff; }
        .byte-box .tooltip {
            display: none; position: absolute; bottom: 100%; left: 50%;
            transform: translateX(-50%); background: #000; color: #fff;
            padding: 4px 8px; font-size: 11px; white-space: nowrap;
            border-radius: 3px; z-index: 10;
        }
        .byte-box:hover .tooltip { display: block; }
    </style>
</head>
<body>
    <h1>EVM64 Web</h1>
    
    <h2>编译器</h2>
    <div class="input-group">
        <label>汇编代码:</label>
        <textarea id="assembly" placeholder="PUSH1 0x02&#10;PUSH1 0x03&#10;STOP">PUSH1 0x02
PUSH1 0x03
STOP</textarea>
    </div>
    <button onclick="compile()">编译</button>
    <button onclick="run()">编译并运行</button>
    

    
    <div class="input-group">
        <label>字节码 (hex):</label>
        <input type="text" id="bytecode" value="6002600300" placeholder="例如: 6002600300" oninput="renderBytecode()">
    </div>
    <div class="bytecode-display" id="bytecodeDisplay"></div>
    
    <h2>EVM</h2>
    <div class="input-group">
        <label>Gas 限制:</label>
        <input type="text" id="gasLimit" value="10000000000">
    </div>
    
    <button onclick="runEVM()">运行字节码</button>
    
    <div class="result" id="result" style="display:none;">
        <strong>输出:</strong> <span id="output"></span> | 
        <strong>Gas Used:</strong> <span id="gasUsed"></span> |
        <strong>Error:</strong> <span id="error"></span>
    </div>
    
    <table id="traceTable">
        <thead>
            <tr>
                <th>PC</th>
                <th>Op</th>
                <th>OpName</th>
                <th>Gas</th>
                <th>GasCost</th>
                <th>MemSize</th>
                <th>Stack</th>
                <th>Depth</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <script type="module">
        import { EVM64 } from '../core/evm64.mjs';
        import { Compiler } from '../core/compiler.mjs';
        import { createOpcodes } from '../common/opcodes.mjs';

        const opcodes = createOpcodes();
        const opcodeNames = {};
        Object.entries(opcodes).forEach(([k, v]) => { opcodeNames[Number(k)] = v.name; });

        window.renderBytecode = function() {
            const bytecode = document.getElementById('bytecode').value.trim();
            const container = document.getElementById('bytecodeDisplay');
            container.innerHTML = '';
            if (!bytecode) return;
            for (let i = 0; i < bytecode.length; i += 2) {
                const hex = bytecode.slice(i, i + 2);
                const byteVal = parseInt(hex, 16);
                const opName = opcodeNames[byteVal] || 'UNKNOWN';
                const box = document.createElement('div');
                box.className = 'byte-box';
                box.dataset.pc = i / 2;
                box.innerHTML = `${hex}<span class="tooltip">${opName}</span>`;
                container.appendChild(box);
            }
        };

        renderBytecode();

        window.compile = function() {
            const source = document.getElementById('assembly').value;
            const compiler = new Compiler();
            try {
                const bytecode = compiler.compile(source);
                document.getElementById('bytecode').value = bytecode;
                renderBytecode();
            } catch (e) {
                alert('编译错误: ' + e.message);
            }
        };

        window.run = function() {
            compile();
            setTimeout(runEVM, 50);
        };

        window.runEVM = function() {
            const bytecode = document.getElementById('bytecode').value.trim();
            const gasLimit = document.getElementById('gasLimit').value.trim() || "10000000000";
            
            if (!bytecode) {
                alert("请输入字节码");
                return;
            }

            const vm = new EVM64(bytecode, gasLimit);
            const result = vm.run(true);

            document.getElementById('result').style.display = 'block';
            const outputStr = result.output.length > 0 ? Array.from(result.output).map(b => b.toString(16).padStart(2, '0')).join('') : '';
            document.getElementById('output').textContent = outputStr;
            document.getElementById('gasUsed').textContent = result.gasUsed;
            document.getElementById('error').textContent = result.reverted ? 'execution reverted' : '';

            const tbody = document.querySelector('#traceTable tbody');
            tbody.innerHTML = '';

            renderBytecode();

            result.traces.forEach(t => {
                const tr = document.createElement('tr');
                tr.dataset.pc = t.pc;
                tr.innerHTML = `
                    <td>${t.pc}</td>
                    <td>${t.op}</td>
                    <td>${t.opName}</td>
                    <td>${t.gas}</td>
                    <td>${t.gasCost}</td>
                    <td>${t.memSize}</td>
                    <td class="stack-val">[${t.stack.join(', ')}]</td>
                    <td>${t.depth}</td>
                `;
                tr.addEventListener('mouseenter', () => {
                    document.querySelectorAll('.byte-box').forEach(b => b.classList.remove('highlight'));
                    const box = document.querySelector(`.byte-box[data-pc="${t.pc}"]`);
                    if (box) box.classList.add('highlight');
                });
                tr.addEventListener('mouseleave', () => {
                    document.querySelectorAll('.byte-box').forEach(b => b.classList.remove('highlight'));
                });
                tbody.appendChild(tr);
            });
        };
    </script>
</body>
</html>
